<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="chat-styles.css">
    <link rel="icon" type="image/svg+xml" href="../logo-title.png">
    <title>Nexus · Chat</title>
</head>
<body>
<div id="app">
    <!-- 添加好友模态框 -->
    <div class="modal-overlay" id="addFriendModal">
        <div class="modal-box">
            <h3>添加好友</h3>
            <input type="text" id="friendSearchInput" placeholder="输入对方账号名" />
            <div class="btn-row">
                <button class="btn-secondary" id="closeAddFriendBtn">取消</button>
                <button class="btn-primary" id="searchFriendBtn">搜索</button>
            </div>
            <div id="searchResult" style="margin-top:12px; display:none;"></div>
        </div>
    </div>

    <!-- 好友申请列表模态框 -->
    <div class="modal-overlay" id="requestModal">
        <div class="modal-box">
            <h3>好友申请</h3>
            <div id="requestList"><div class="empty-state">暂无申请</div></div>
            <div class="btn-row" style="margin-top:12px;">
                <button class="btn-secondary" id="closeRequestsBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 关于模态框 -->
    <div class="modal-overlay" id="aboutModal">
        <div class="modal-box">
            <h3>关于</h3>
            <div cstyle="margin:12px 0; line-height:1.8;">
                <p><strong>版本：正式版 1.11.0</strong></p>
                <p>更新内容：</p>
                <ul style="padding-left:20px; color:var(--accent-color, #3689fe);">
                    <li>修饰界面</li>
                    <li>添加 查看好友信息 功能</li>
                </ul>
                <p style="margin-top:12px; color:#94a3b8;">© 2026 Nexus</p>
            </div>
            <div class="btn-row">
                <button class="btn-secondary" id="closeAboutBtn">关闭</button>
            </div>
        </div>
    </div>
    <!-- 个人设置模态框 -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-box" style="max-width:450px;">
            <h3>个人设置</h3>
            <form id="profileForm" style="margin-top:16px;">
                <div style="margin-bottom:14px;">
                    <label style="display:block; font-size:14px; font-weight:500; color:#334155; margin-bottom:4px;">账号</label>
                    <input type="text" id="profileUsername" disabled style="background:#e9edf2; color:#94a3b8;" />
                </div>
                <div style="margin-bottom:14px;">
                    <label style="display:block; font-size:14px; font-weight:500; color:#334155; margin-bottom:4px;">昵称</label>
                    <input type="text" id="profileNickname" placeholder="输入昵称（留空则显示账号名）" maxlength="20" />
                </div>
                <div style="margin-bottom:14px;">
                    <label style="display:block; font-size:14px; font-weight:500; color:#334155; margin-bottom:4px;">个性签名</label>
                    <input type="text" id="profileBio" placeholder="写点个性签名吧" maxlength="50" />
                </div>
                <div style="margin-bottom:14px;">
                    <label style="display:block; font-size:14px; font-weight:500; color:#334155; margin-bottom:4px;">邮箱</label>
                    <input type="email" id="profileEmail" placeholder="请输入邮箱" />
                </div>
                <div class="btn-row" style="margin-top:16px;">
                    <button type="button" class="btn-secondary" id="closeSettingsBtn">取消</button>
                    <button type="submit" class="btn-primary" id="saveProfileBtn">保存</button>
                </div>
                <div id="profileMessage" style="margin-top:12px; font-size:14px; text-align:center; display:none;"></div>
            </form>
        </div>
    </div>
    <div id="mainPage">
        <header id="topBar">
            <div class="brand">
                <img src="/logo-chat.png" id="logo">
            </div>
            <div class="topActions">
                <button class="roundedBtn" id="addFriendBtn" title="添加好友">
                    <svg t="1783932947505" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="19698" width="23" height="23"><path d="M476.672 514.688a387.285333 387.285333 0 0 0-208 31.317333C140.586667 603.818667 42.666667 732.245333 42.666667 896a42.666667 42.666667 0 0 0 42.666666 42.666667 42.666667 42.666667 0 0 0 42.666667-42.666667c0-130.176 75.392-226.944 175.786667-272.213333 100.352-45.354667 222.848-37.888 320.426666 48.213333a42.666667 42.666667 0 0 0 60.202667-3.754667 42.666667 42.666667 0 0 0-3.754667-60.245333 379.690667 379.690667 0 0 0-203.989333-93.354667z" p-id="19699"></path><path d="M426.666667 85.333333C285.781333 85.333333 170.666667 200.448 170.666667 341.333333s115.114667 256 256 256 256-115.114667 256-256-115.114667-256-256-256z m0 85.333334c94.762667 0 170.666667 75.904 170.666666 170.666666s-75.904 170.666667-170.666666 170.666667-170.666667-75.904-170.666667-170.666667 75.904-170.666667 170.666667-170.666666zM810.666667 640a42.666667 42.666667 0 0 0-42.666667 42.666667v256a42.666667 42.666667 0 0 0 42.666667 42.666666 42.666667 42.666667 0 0 0 42.666666-42.666666v-256a42.666667 42.666667 0 0 0-42.666666-42.666667z" p-id="19700"></path><path d="M682.666667 768a42.666667 42.666667 0 0 0-42.666667 42.666667 42.666667 42.666667 0 0 0 42.666667 42.666666h256a42.666667 42.666667 0 0 0 42.666666-42.666666 42.666667 42.666667 0 0 0-42.666666-42.666667z" p-id="19701"></path></svg>
                </button>
                <button class="roundedBtn" id="settingsBtn" title="设置">
                    <svg t="1783933046673" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="19869" width="23" height="23"><path d="M512 43.434667c-65.152 0-134.144 48.213333-141.824 128.981333a42.666667 42.666667 0 0 0 0.085333 0.085333 42.666667 42.666667 0 0 0-0.170666 0.256c-3.626667 40.832-44.032 64.042667-81.194667 46.762667a42.666667 42.666667 0 0 0-0.426667-0.170667c-73.6-33.322667-149.632 2.218667-182.144 58.453334-32.469333 56.32-25.301333 139.989333 40.362667 187.093333a42.666667 42.666667 0 0 0 0.426667 0.256c33.493333 23.552 33.493333 70.058667 0 93.610667a42.666667 42.666667 0 0 0-0.384 0.256c-65.706667 47.104-72.96 130.858667-40.405334 187.136 32.512 56.32 108.586667 91.946667 182.272 58.496a42.666667 42.666667 0 0 0 0.426667-0.213334c37.12-17.365333 77.525333 5.973333 81.152 46.805334a42.666667 42.666667 0 0 0 0 0.256c7.68 80.725333 76.672 129.066667 141.824 129.066666s134.229333-48.341333 141.909333-129.066666a42.666667 42.666667 0 0 0 0-0.256c3.626667-40.832 43.946667-64.128 81.066667-46.848a42.666667 42.666667 0 0 0 0.426667 0.256c73.685333 33.450667 149.76-2.176 182.272-58.453334 32.512-56.32 25.344-140.074667-40.405334-187.178666a42.666667 42.666667 0 0 0-0.341333-0.256c-33.536-23.552-33.536-70.058667 0-93.610667a42.666667 42.666667 0 0 0 0.341333-0.256c65.706667-47.104 72.96-130.773333 40.405334-187.050667-32.512-56.32-108.586667-91.946667-182.272-58.496a42.666667 42.666667 0 0 0-0.426667 0.170667c-37.12 17.28-77.44-5.973333-81.066667-46.762667a42.666667 42.666667 0 0 0 0-0.341333c-7.68-80.725333-76.8-128.981333-141.909333-128.981333z m0 85.333333c28.544 0 53.12 11.946667 56.917333 51.712v-0.213333c8.576 97.109333 113.706667 157.738667 202.069334 116.565333l-0.298667 0.170667c36.266667-16.469333 58.88-1.152 73.130667 23.466666 14.250667 24.661333 16.128 51.925333-16.213334 75.093334l0.298667-0.213334c-79.786667 55.978667-79.786667 177.322667 0 233.301334l-0.341333-0.256c32.426667 23.210667 30.506667 50.474667 16.256 75.093333-14.208 24.661333-36.906667 39.893333-73.130667 23.466667l0.298667 0.128c-88.32-41.173333-193.493333 19.541333-202.069334 116.650666v-0.298666c-3.797333 39.765333-28.373333 51.797333-56.917333 51.797333s-53.12-12.032-56.917333-51.797333c-8.789333-96.938667-113.92-157.525333-202.154667-116.352l0.426667-0.170667c-36.266667 16.469333-58.965333 1.237333-73.173334-23.424-14.250667-24.618667-16.128-51.882667 16.213334-75.093333l-0.298667 0.256c79.786667-55.978667 79.786667-177.322667 0-233.301334l0.341333 0.256c-32.341333-23.210667-30.421333-50.389333-16.213333-75.008 14.250667-24.618667 36.906667-39.893333 73.088-23.509333l-0.426667-0.256c88.32 41.130667 193.28-19.328 202.112-116.266667a42.666667 42.666667 0 0 0 0.085334-0.085333c3.797333-39.765333 28.373333-51.712 56.917333-51.712z" p-id="19870"></path><path d="M512 341.333333c-93.738667 0-170.666667 76.928-170.666667 170.666667s76.928 170.666667 170.666667 170.666667 170.666667-76.928 170.666667-170.666667-76.928-170.666667-170.666667-170.666667z m0 85.333334c47.616 0 85.333333 37.717333 85.333333 85.333333s-37.717333 85.333333-85.333333 85.333333-85.333333-37.717333-85.333333-85.333333 37.717333-85.333333 85.333333-85.333333z" p-id="19871"></path></svg>
                </button>
            </div>
        </header>
        <div class="content-row">
            
            <div id="friendList">
                <div id="requestEntry">
                    <span>📩 好友申请</span>
                    <span class="badge" id="requestBadge">0</span>
                </div>
                <div class="list" id="friendListContainer"><div class="empty-state">加载中...</div></div>
                <div class="user-footer">
                    <span id="myUsername">用户</span>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <button class="logout-btn" id="logoutBtn">退出</button>
                    </div>
                </div>
            </div>
            <div id="chatArea">
                <!-- 原有聊天区域，保留 chat-header -->
                <div class="chat-header">
                    <button class="back-btn" id="backBtn">‹</button>
                    <button class="friend-name-btn" id="chatFriendName" title="点击查看好友资料">选择好友</button>
                    <div class="actions">
                        <button class="roundedBtn" id="menuToggleBtn" title="更多操作">
                            <svg t="1783933655400" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="20041" width="23" height="23"><path d="M170.666667 170.666667a42.666667 42.666667 0 0 0-42.666667 42.666666 42.666667 42.666667 0 0 0 42.666667 42.666667h682.666666a42.666667 42.666667 0 0 0 42.666667-42.666667 42.666667 42.666667 0 0 0-42.666667-42.666666zM170.666667 469.333333a42.666667 42.666667 0 0 0-42.666667 42.666667 42.666667 42.666667 0 0 0 42.666667 42.666667h682.666666a42.666667 42.666667 0 0 0 42.666667-42.666667 42.666667 42.666667 0 0 0-42.666667-42.666667zM170.666667 768a42.666667 42.666667 0 0 0-42.666667 42.666667 42.666667 42.666667 0 0 0 42.666667 42.666666h682.666666a42.666667 42.666667 0 0 0 42.666667-42.666666 42.666667 42.666667 0 0 0-42.666667-42.666667z" p-id="20042"></path></svg>
                        </button>
                    </div>
                    <!-- 侧栏菜单 -->
                    <div id="chatSideMenu" class="chat-side-menu">
                        <div class="side-menu-overlay" id="sideMenuOverlay"></div>
                        <div class="side-menu-content">
                            <div class="side-menu-header">
                                <span>更多操作</span>
                                <button id="sideMenuCloseBtn">✕</button>
                            </div>
                            <div class="side-menu-item" id="clearChatMenuItem">
                                <span class="icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 6h18"/>
                                        <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
                                        <path d="M5 6l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/>
                                        <path d="M10 11v6"/>
                                        <path d="M14 11v6"/>
                                    </svg>
                                </span>
                                <span>清除聊天记录</span>
                            </div>
                            <div class="side-menu-item danger" id="deleteFriendMenuItem">
                                <span class="icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="10"/>
                                        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                                    </svg>
                                </span>
                                <span>删除好友</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="message-box" id="messageBox"><div class="empty-state">选择一位好友开始聊天</div></div>
                <div id="newMsgHint" style="display:none; position:sticky; bottom:60px; left:0; right:0; text-align:center; pointer-events:none; z-index:5;">
                    <button id="newMsgBtn" style="pointer-events:auto; background:#3b82f6; color:white; border:none; border-radius:30px; padding:8px 20px; font-size:14px; box-shadow:0 4px 12px rgba(59,130,246,0.3); cursor:pointer; transition:0.2s;">新消息 <span id="newMsgCount">0</span> 条</button>
                </div>
                <div id="emojiPanel" style="display:none; padding:8px 12px; background:white; flex-wrap:wrap; gap:4px; max-height:150px; overflow-y:auto;"></div>
                <!-- 引用条（输入框上方） -->
                <div id="replyBar" style="display:none; padding:8px 16px; background:#f1f5f9; border-top:1px solid #e9edf2; align-items:center; gap:12px; font-size:14px; color:#64748b; min-height:40px;">
                    <span style="flex:1;"></span>
                    <button onclick="cancelReply()" style="background:none; border:none; cursor:pointer; font-size:18px;">✕</button>
                </div>
                <div class="input-area">
                    <input type="text" id="chatInput" placeholder="输入消息..." maxlength="200" autocomplete="off" />
                    <button class="btn-emoji" id="emojiBtn" title="选择表情">😊</button>
                    <button class="btn-send" id="sendBtn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 自定义右键菜单 -->
    <div id="customMenu" style="display:none; position:fixed; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,0.15); padding:6px 0; z-index:99999; min-width:140px; border:1px solid #e9edf2;">
        <div class="menu-item" id="menuRecall" style="padding:10px 20px; cursor:pointer; font-size:14px; transition:0.1s; display:flex; align-items:center; gap:8px;">
            <span>↩️</span> 撤回
        </div>
        <div class="menu-item" id="menuReply" style="padding:10px 20px; cursor:pointer; font-size:14px; transition:0.1s; display:flex; align-items:center; gap:8px;">
            <span>💬</span> 引用
        </div>
    </div>
    <!-- 自定义确认框 -->
    <div id="customConfirm" style="display:none;">
        <div class="box">
            <div class="title" id="confirmTitle">提示</div>
            <div class="message" id="confirmMessage">确定执行此操作吗？</div>
            <div class="row">
                <button class="cancel" id="confirmCancel">取消</button>
                <button class="ok" id="confirmOk">确定</button>
            </div>
        </div>
    </div>
    <!-- 好友资料模态框 -->
    <div class="modal-overlay" id="friendProfileModal">
        <div class="modal-box" style="max-width: 380px;">
            <h3>好友资料</h3>
            <div style="margin-top: 16px; line-height: 2;">
                <div><strong>账号：</strong><span id="fpUsername">-</span></div>
                <div><strong>昵称：</strong><span id="fpNickname">-</span></div>
                <div><strong>个性签名：</strong><span id="fpBio">这个人很懒，什么都没写</span></div>
                <!-- 可扩展更多字段 -->
            </div>
            <div class="btn-row" style="margin-top: 16px;">
                <button class="btn-secondary" id="closeFriendProfileBtn">关闭</button>
            </div>
        </div>
    </div>
    <!-- Toast 通知容器 -->
    <div id="toastContainer" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:99999; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none;"></div>
</div>
<script src="chat-javascript.js"></script>
</body>
</html>
