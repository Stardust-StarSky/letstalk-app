<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <link rel="icon" type="image/svg+xml" href="../logo-only.png">
    <title>Nexus · 注册</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, sans-serif; }
        body { background: url('../background.png') no-repeat center center / cover; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .container { 
            width: 100%;
            max-width: 420px;
            min-width: 280px;
            background: rgba(62, 64, 77, 0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(1px);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            transition: box-shadow 0.3s, background 0.3s;
            margin: 0 auto;
        }
        .container:hover {
            box-shadow: 0 0 40px rgba(255,255,255,0.4);
        }
        .logo { text-align:center; margin-bottom:32px; }
        .logo h1 { color:#f1f5f9; font-size:28px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:12px; }
        .logo h1 small { font-size:16px; font-weight:400; color:white; }
        .logo img { width:100px; height:100px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; color:white; font-size:14px; font-weight:500; margin-bottom:6px; }
        .form-group input { width:100%; padding:14px 16px; border-radius:16px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); color:#f1f5f9; font-size:16px; outline:none; transition:0.2s; }
        .form-group input:focus { border-color:#3b82f6; background:rgba(255,255,255,0.1); box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        .form-group .hint { font-size:14px; color:#99a9bf; margin-top:5px; margin-bottom: 10px; }
        .btn { width:100%; padding:14px; border:none; border-radius:16px; font-size:16px; font-weight:600; cursor:pointer; transition:0.2s; }
        .btn-primary { background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; box-shadow:0 4px 16px rgba(59,130,246,0.3); }
        .btn-primary:hover { box-shadow:0 6px 24px rgba(59,130,246,0.4); transform:translateY(-1px); }
        .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .btn-secondary { background:rgba(255,255,255,0.08); color:#cbd5e1; border:1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background:rgba(255,255,255,0.14); }
        .error-msg { color:#fca5a5; background:#450a0a; padding:10px 16px; border-radius:12px; font-size:14px; display:none; margin-bottom:12px; }
        .success-msg { color:#86efac; background:#064e3b; padding:10px 16px; border-radius:12px; font-size:14px; display:none; margin-bottom:12px; }
        .footer { text-align:center; margin-top:20px; color:#ccc; font-size:13px; }
        .footer a { color:white; text-decoration:none; }
        .footer a:hover { color:white; text-decoration:underline; }
        .password-strength { display:flex; gap:4px; margin-top:6px; }
        .password-strength .bar { flex:1; height:4px; border-radius:4px; background:#2a2a32; transition:0.3s; }
        .password-strength .bar.active.weak { background:#ef4444; }
        .password-strength .bar.active.medium { background:#f59e0b; }
        .password-strength .bar.active.strong { background:#22c55e; }
        
    </style>
</head>
<body>
<div class="container">
    <button onclick="window.location.href='/'" style="position: absolute; top: 12px; left: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: rgba(255,255,255,0.6); transition: 0.2s;">
        <svg t="1783864795039" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="5122" width="20" height="20"><path d="M 704.9 34.889 c -28.654 0 -54.356 12.516 -72.013 32.357 l -373.91 373.912 c -19.855 17.664 -32.357 43.363 -32.357 72.008 c 0 24.114 8.872 46.126 23.519 63.04 l -0.279 0.278 l 385.635 385.418 c 17.537 18.195 42.144 29.534 69.389 29.534 c 53.228 0 96.36 -43.133 96.36 -96.349 c 0 -30.843 -14.496 -58.265 -37.032 -75.911 l -305.802 -305.798 l 307.761 -307.765 c 21.433 -17.661 35.08 -44.422 35.08 -74.348 c 0 -53.228 -43.14 -96.358 -96.36 -96.358 l 0.009 -0.019 Z M 704.9 34.889 Z" p-id="5123" fill="#87868f"></path></svg>
    </button>
    <div class="logo">
        <img src="../logo.png" alt="Nexus" draggable="false"/>
        <h1>注册</h1>
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <form id="signupForm">
        <div class="form-group">
            <label>账号</label>
            <input type="text" id="usernameInput" placeholder="请输入账号（至少2位）" autocomplete="off" />
            <div class="hint">账号将作为登录名，不可更改</div>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="passwordInput" placeholder="请输入密码（至少6位）" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" />
            <div class="hint">需包含大写字母、小写字母和数字</div>
            <div class="password-strength" id="strengthBars">
                <div class="bar" data-index="0"></div>
                <div class="bar" data-index="1"></div>
                <div class="bar" data-index="2"></div>
            </div>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="confirmInput" placeholder="再次输入密码" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" />
        </div>
        <button type="submit" class="btn btn-primary" id="registerBtn">提交申请</button>
    </form>
    <div class="footer">
        已有账号？<a href="/login">返回登录</a>
    </div>
</div>

<script>
    const WORKER_URL = 'https://admin.mynexus.dpdns.org';
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const confirmInput = document.getElementById('confirmInput');
    const registerBtn = document.getElementById('registerBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
    }
    function showSuccess(msg) {
        successMsg.textContent = msg;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
    }

    function checkPasswordStrength(password) {
        let score = 0;
        if (password.length >= 6) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        return score;
    }

    function updateStrengthBars(password) {
        const score = checkPasswordStrength(password);
        const bars = document.querySelectorAll('.bar');
        bars.forEach(bar => { bar.className = 'bar'; });
        const level = Math.min(score, 3);
        for (let i = 0; i < level; i++) {
            bars[i].classList.add('active');
            if (score >= 4) bars[i].classList.add('strong');
            else if (score >= 2) bars[i].classList.add('medium');
            else bars[i].classList.add('weak');
        }
    }

    passwordInput.addEventListener('input', function() {
        updateStrengthBars(this.value);
    });

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (!username || username.length < 2) {
            showError('账号至少2位');
            return;
        }
        if (!password || password.length < 6) {
            showError('密码至少6位');
            return;
        }
        if (password !== confirm) {
            showError('两次密码输入不一致');
            return;
        }
        if (!/[a-z]/.test(password) || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
            showError('密码需包含大写字母、小写字母和数字');
            return;
        }

        registerBtn.disabled = true;
        registerBtn.textContent = '提交中...';

        // 找到这一段并替换：
    try {
        const resp = await fetch(`${WORKER_URL}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        // 🔥 修复核心：先检查响应状态，并确保有内容可读
        const contentType = resp.headers.get("content-type") || "";
        if (!resp.ok || !contentType.includes("application/json")) {
            const errorText = await resp.text(); // 哪怕跨域失败或返回404，也当做文本读，不让它报JSON错
            showError('❌ 服务器或跨域错误: ' + (errorText || '无法连接到后端Worker'));
            registerBtn.disabled = false;
            registerBtn.textContent = '提交申请';
            return;
        }

        const result = await resp.json();
        if (result.success) {
            showSuccess('✅ 注册申请已提交！请等待管理员审核。');
            registerBtn.disabled = false;
            registerBtn.textContent = '提交申请';
            usernameInput.value = '';
            passwordInput.value = '';
            confirmInput.value = '';
            document.querySelectorAll('.bar').forEach(bar => { bar.className = 'bar'; });
            setTimeout(() => {
                location.href = '/';
            }, 1000);
        } else {
            showError('❌ ' + (result.error || '提交失败'));
            registerBtn.disabled = false;
            registerBtn.textContent = '提交申请';
        }
    } catch (err) {
        showError('网络错误: ' + err.message);
        registerBtn.disabled = false;
        registerBtn.textContent = '提交申请';
    }
    });
</script>
</body>
</html>
