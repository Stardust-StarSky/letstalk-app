<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="../logo-title.png">
    <title>Nexus · Chat Everywhere</title>
</head>
<body>

<div id="app">
    <!-- 登录界面 -->
    <div id="loginPage">
        <div class="login-card" style="margin: 0 auto;">
            <button onclick="window.location.href='/'" style="position: absolute; top: 12px; left: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: rgba(255,255,255,0.6); transition: 0.2s;">
                <svg t="1783864795039" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="5122" width="20" height="20"><path d="M 704.9 34.889 c -28.654 0 -54.356 12.516 -72.013 32.357 l -373.91 373.912 c -19.855 17.664 -32.357 43.363 -32.357 72.008 c 0 24.114 8.872 46.126 23.519 63.04 l -0.279 0.278 l 385.635 385.418 c 17.537 18.195 42.144 29.534 69.389 29.534 c 53.228 0 96.36 -43.133 96.36 -96.349 c 0 -30.843 -14.496 -58.265 -37.032 -75.911 l -305.802 -305.798 l 307.761 -307.765 c 21.433 -17.661 35.08 -44.422 35.08 -74.348 c 0 -53.228 -43.14 -96.358 -96.36 -96.358 l 0.009 -0.019 Z M 704.9 34.889 Z" p-id="5123" fill="#87868f"></path></svg>
            </button>
            <form id="loginForm" autocomplete="off">
                <img src="/logo.png" alt="Nexus Logo" width="200" height="200" style="display:block; margin:0 auto 5px;" draggable="false"/>
                <div class="input-box">
                    <i class="fas fa-user icon"></i>
                    <input type="text" id="usernameInput" required />
                    <label>账号</label>
                </div>
                <div class="input-box">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="passwordInput" required readonly onfocus="this.removeAttribute('readonly');" />
                    <label>密码</label>
                </div>
                <button type="submit" class="btn" id="loginBtn">登 录</button>
                <div id="loginError" class="error-msg hidden"></div>
                <div id="kvError" class="error-msg hidden"></div>
                <div class="account-info" id="accountInfo">欢迎使用 Nexus</div>
                <div class="signup-link">还没有账号？<a href="/signup">立即注册</a></div>
            </form>
        </div>
    </div>
</div>
<div id="toastContainer" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:99999; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none;"></div>
<script src="javascript.js"></script>
</body>
</html>
